version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: bsop_user
      POSTGRES_PASSWORD: bsop_password
      POSTGRES_DB: bsop_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: 
      context: .
      dockerfile: backend.Dockerfile
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://bsop_user:bsop_password@db/bsop_intelligence
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: backend.Dockerfile
    command: celery -A backend.app.worker.tasks worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://bsop_user:bsop_password@db/bsop_intelligence
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
